name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: freestyle-vm
    steps:
      - name: Checkout
        uses: checkout

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Deploy to Cloudflare
        run: bunx wrangler deploy
