name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: freestyle-vm
    steps:
      - name: Checkout
        uses: checkout

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test

      - name: Lint
        run: bun run lint
